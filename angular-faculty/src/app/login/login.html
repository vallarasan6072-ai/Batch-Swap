<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    /* Full page background */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #eaeaea, #dbdbdb);
      font-family: 'Segoe UI', sans-serif;
    }

    /* Card */
    .login-card {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    /* Title */
    .login-card h2 {
      margin-bottom: 5px;
      color: #333;
    }

    .subtitle {
      color: #777;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* Input */
    .input-group input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 5px rgba(108,99,255,0.5);
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6c63ff, #5a54d1);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #5a54d1, #4b45b5);
    }

    /* Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

</head>

<body>

  <div class="login-card">

    <h2>Welcome Staff 👋</h2>
    <p class="subtitle">Login to continue</p>

    <div class="input-group">
      <input [(ngModel)]="username" placeholder="Username">
    </div>

    <div class="input-group">
      <input [(ngModel)]="password" type="password" placeholder="Password">
    </div>

    <button class="login-btn" (click)="onLogin()">
      Login
    </button>

  </div>

</body>
</html>
