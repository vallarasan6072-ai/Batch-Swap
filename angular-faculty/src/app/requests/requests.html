<h2 class="title">📋 Admin Requests</h2>

<div class="container">

  <h3>Pending Requests</h3>

  @for (r of pendingRequests; track r._id) {
    <div class="card pending">
      
      <div class="info">
        <h4>{{r.student}}</h4>
        <p>{{r.currentClass}} ➡ {{r.requestedClass}}</p>
      </div>

      <div class="actions">
        <button class="approve" (click)="onAccept(r._id)">✅</button>
        <button class="reject" (click)="onReject(r._id)">❌</button>
      </div>

    </div>
  }

  <h3>Processed Requests</h3>

  @for (r of resolvedRequests; track r._id) {
    <div class="card" [ngClass]="r.status">
      
      <div class="info">
        <h4>{{r.student}}</h4>
        <p>{{r.currentClass}} ➡ {{r.requestedClass}}</p>
      </div>

      <span class="status">{{r.status}}</span>

    </div>
  }

</div>
